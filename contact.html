<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestSite — Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loader">
    <div class="loader-ring"></div>
  </div>

  <canvas id="particle-canvas"></canvas>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">TestSite</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <section class="page-hero">
    <h1 class="hero-title"><span class="line gradient-text">Contact</span></h1>
    <p class="hero-sub">We'd love to hear from you</p>
  </section>

  <section class="contact-section">
    <div class="contact-grid">
      <div class="contact-form-wrapper scroll-fade">
        <form class="contact-form" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="5" placeholder="Tell us what's on your mind..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Send Message</button>
        </form>
        <div class="form-success" id="form-success">
          <span class="success-icon">&#x2714;</span>
          <p>Message sent! We'll be in touch soon.</p>
        </div>
      </div>

      <div class="contact-info scroll-fade">
        <div class="info-card">
          <div class="info-icon">&#x1F4CD;</div>
          <h3>Location</h3>
          <p>The Internet, Everywhere</p>
        </div>
        <div class="info-card">
          <div class="info-icon">&#x2709;</div>
          <h3>Email</h3>
          <p>hello@testsite.dev</p>
        </div>
        <div class="info-card">
          <div class="info-icon">&#x1F310;</div>
          <h3>Social</h3>
          <p>@testsite</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 TestSite. Built with passion.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
